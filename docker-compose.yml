services:
  app:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - DATABASE_URL=postgres://pomodoro:${DB_PASSWORD}@db:5432/pomodoro
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=pomodoro
      - POSTGRES_USER=pomodoro
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pomodoro"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${WEB_HOST_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  migrate:
    build:
      context: .
      target: deps
    working_dir: /app
    command: npx drizzle-kit push
    environment:
      - DATABASE_URL=postgres://pomodoro:${DB_PASSWORD}@db:5432/pomodoro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
